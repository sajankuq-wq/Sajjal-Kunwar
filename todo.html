<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List Application</title>
    <style>
        body { font-family: Arial, sans-serif; }
        #taskInput { width: 300px; }
        #tasks { margin-top: 20px; }
        .completed { text-decoration: line-through; }
    </style>
</head>
<body>
    <h1>To-Do List</h1>
    <input type="text" id="taskInput" placeholder="Add a new task..." />
    <button id="addTaskBtn">Add Task</button>
    <br /><br />
    <button id="filterAll">All</button>
    <button id="filterActive">Active</button>
    <button id="filterCompleted">Completed</button>
    <ul id="tasks"></ul>

    <script>
        const tasksList = document.getElementById('tasks');
        const taskInput = document.getElementById('taskInput');
        const addTaskBtn = document.getElementById('addTaskBtn');
        const filterAll = document.getElementById('filterAll');
        const filterActive = document.getElementById('filterActive');
        const filterCompleted = document.getElementById('filterCompleted');

        let tasks = JSON.parse(localStorage.getItem('tasks')) || [];

        function renderTasks(tasksToRender) {
            tasksList.innerHTML = '';
            tasksToRender.forEach((task, index) => {
                const li = document.createElement('li');
                li.textContent = task.text;
                if (task.completed) li.classList.add('completed');
                li.addEventListener('click', () => toggleTaskCompleted(index));
                const deleteBtn = document.createElement('button');
                deleteBtn.textContent = 'Delete';
                deleteBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    deleteTask(index);
                });
                li.appendChild(deleteBtn);
                tasksList.appendChild(li);
            });
        }

        function addTask() {
            if (taskInput.value) {
                tasks.push({ text: taskInput.value, completed: false });
                taskInput.value = '';
                saveTasks();
                renderTasks(tasks);
            }
        }

        function toggleTaskCompleted(index) {
            tasks[index].completed = !tasks[index].completed;
            saveTasks();
            renderTasks(tasks);
        }

        function deleteTask(index) {
            tasks.splice(index, 1);
            saveTasks();
            renderTasks(tasks);
        }

        function saveTasks() {
            localStorage.setItem('tasks', JSON.stringify(tasks));
        }

        function filterTasks(filter) {
            let filteredTasks;
            if (filter === 'active') {
                filteredTasks = tasks.filter(task => !task.completed);
            } else if (filter === 'completed') {
                filteredTasks = tasks.filter(task => task.completed);
            } else {
                filteredTasks = tasks;
            }
            renderTasks(filteredTasks);
        }

        addTaskBtn.addEventListener('click', addTask);
        filterAll.addEventListener('click', () => filterTasks('all'));
        filterActive.addEventListener('click', () => filterTasks('active'));
        filterCompleted.addEventListener('click', () => filterTasks('completed'));

        // Initial render
        renderTasks(tasks);
    </script>
</body>
</html>
